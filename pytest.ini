[pytest]
addopts = -ra
testpaths =
    test
markers =
    backend: SQLAlchemy backend selection marker used by the official suite
    sparse_backend: SQLAlchemy official suite sparse backend marker
    sparse_driver_backend: SQLAlchemy official suite sparse driver backend marker
    mypy: SQLAlchemy optional typing checks marker
    memory_intensive: SQLAlchemy official suite memory-intensive marker
    timing_intensive: SQLAlchemy official suite timing-intensive marker
