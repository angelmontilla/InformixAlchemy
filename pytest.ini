[pytest]
addopts = -ra
testpaths =
    test
markers =
    backend: SQLAlchemy backend selection marker used by the official suite
    sparse_backend: SQLAlchemy official suite sparse backend marker
    sparse_driver_backend: SQLAlchemy official suite sparse driver backend marker
    mypy: SQLAlchemy optional typing checks marker
    memory_intensive: SQLAlchemy official suite memory-intensive marker
    timing_intensive: SQLAlchemy official suite timing-intensive marker
    serial_identity: Tests covering SERIAL, SERIAL8, BIGSERIAL, and identity-style autoincrement behavior
    ddl_compiler: SQL compilation-only tests for the Informix dialect
    ddl_execute: DDL execution tests against a live Informix backend
    optional_probe_isolation: Optional probe tests that validate behavior after failure/isolation scenarios
    quoting: Tests for quoted and unquoted identifier handling and case folding
    temp_tables: Tests for Informix temporary table behavior and inspection limits
    requires_informix: Tests that require a live Informix database
    legacy_ifxpy: Legacy IfxPy backend tests kept outside the main supported pyodbc gate
    reflection_composite: Reflection tests for composite keys, indexes, and foreign keys
    reflection_minimal: Reflection tests for minimal single-table and single-foreign-key setups
    sqlalchemy_suite: Tests related to SQLAlchemy third-party suite integration/gating
