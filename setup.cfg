[egg_info]
tag_build =

[nosetests]
with-sqla_testing = true
where = test
cover-package = IfxAlchemy
with-coverage = 1
cover-erase = 1
verbosity = 1

[sqla_testing]
requirement_cls=IfxAlchemy.requirements:Requirements
profile_file=.profiles.txt

[db]
# Use an isolated Informix database for the official SQLAlchemy suite.
# The shared faempre999 database is suitable for the package tests but not for
# full official-suite reflection coverage.
default=informix+pyodbc://informix:in4mix@127.0.0.1/prueba4db?driver=IBM+INFORMIX+ODBC+DRIVER+(64-bit)&protocol=onsoctcp&server=informix&service=9088&DELIMIDENT=Y
sqlite=sqlite:///:memory:

