[pytest]
addopts = -ra
markers =
    reflection_minimal: reflection minima sobre catalogo Informix
    reflection_composite: PK/UK/FK e indices compuestos
    temp_tables: tablas temporales y semantica por conexion
    ddl_compiler: compilacion DDL sin tocar BD
    ddl_execute: ejecucion DDL real contra Informix
    serial_identity: autoincrement / serial / identity
    quoting: quoting y normalizacion de nombres
    sqlalchemy_suite: gate para conectar la suite oficial de terceros
